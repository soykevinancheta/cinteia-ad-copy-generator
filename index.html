<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ad Copy Generator - Cinteia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-lg">

    <!-- HEADER -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">
        Generador de Anuncios
      </h1>
      <p class="text-gray-400">
        Crea textos de alto impacto para tus campañas 🚀
      </p>
    </div>

    <!-- CARD -->
    <div class="bg-gray-800/80 backdrop-blur p-8 rounded-2xl shadow-2xl border border-gray-700">

      <div class="mb-5">
        <label class="block mb-2 text-sm text-gray-300">Producto o servicio</label>
        <input id="product" type="text"
          class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
      </div>

      <div class="mb-6">
        <label class="block mb-2 text-sm text-gray-300">Beneficio principal</label>
        <input id="benefit" type="text"
          class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
      </div>

      <!-- BOTÓN -->
      <button onclick="generateCopy()"
        class="w-full bg-white text-black p-3 rounded-xl font-semibold hover:bg-gray-300 transition transform hover:scale-105">
        Generar anuncio
      </button>

      <!-- RESULTADO -->
      <div id="result" class="mt-6 text-sm text-gray-200 leading-relaxed"></div>

    </div>

    <!-- FOOTER -->
    <div class="text-center mt-6 text-sm text-gray-500">
      <a href="/tools/" class="hover:text-white transition">
        ← Volver a herramientas
      </a>
    </div>

  </div>

  <script>
    function generateCopy() {
      const product = document.getElementById("product").value;
      const benefit = document.getElementById("benefit").value;

      if (!product || !benefit) {
        document.getElementById("result").innerHTML = "⚠️ Completa todos los campos";
        return;
      }

      const copies = [
        `🚀 ¿Buscas ${benefit}?<br><br>${product} es la solución que necesitas.<br>Empieza hoy mismo.`,
        
        `🔥 ${product} que realmente funciona<br><br>Logra ${benefit} sin complicaciones.<br>Da el siguiente paso.`,
        
        `💡 La forma más fácil de conseguir ${benefit}<br><br>Con ${product}, todo es más simple.<br>Descúbrelo ahora.`,
        
        `⚡ Deja de perder tiempo<br><br>${product} te ayuda a lograr ${benefit} rápido y fácil.<br>Empieza hoy.`,
        
        `📈 Mejora tus resultados hoy<br><br>${product} te permite alcanzar ${benefit} sin esfuerzo.<br>No te quedes atrás.`
      ];

      const random = copies[Math.floor(Math.random() * copies.length)];

      // Simulación IA (delay)
      document.getElementById("result").innerHTML = "🤖 Generando anuncio...";

      setTimeout(() => {
        let message = random;

        message += "<br><br><span class='text-white font-semibold'>👉 Si quieres anuncios que realmente vendan, contáctame en Cinteia.</span>";

        document.getElementById("result").innerHTML = message;
      }, 1200);
    }
  </script>

</body>
</html>
